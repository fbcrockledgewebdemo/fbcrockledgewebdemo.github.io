{% assign share_kind = include.kind | default: 'page' %}
{% assign share_url = page.url | absolute_url %}
<section class="content-share" aria-labelledby="share-{{ share_kind }}-heading">
  <h2 id="share-{{ share_kind }}-heading">Share this {{ share_kind }}</h2>
  <div class="content-share-actions">
    <button class="content-share-button" type="button" data-share-button data-share-title="{{ page.title | escape }}" data-share-url="{{ share_url | escape }}">Share</button>
    <a class="content-share-button" href="https://www.facebook.com/sharer/sharer.php?u={{ share_url | url_encode }}" target="_blank" rel="noopener noreferrer">Facebook</a>
  </div>
  <p class="content-share-status" data-share-status aria-live="polite"></p>
</section>
