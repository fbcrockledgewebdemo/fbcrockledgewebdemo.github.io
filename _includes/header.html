{% assign church = site.data.church %}
<header class="site-header">
  {% capture navigation_links %}
    <li class="nav-item"><a href="{{ '/' | relative_url }}"><span>Home</span></a></li>
    <li class="nav-item"><a href="{{ '/about' | relative_url }}"><span>About</span></a></li>
    <li class="nav-item"><a href="{{ '/services' | relative_url }}"><span>Services</span></a></li>
    <li class="nav-item"><a href="{{ '/events' | relative_url }}"><span>Events</span></a></li>
    <li class="nav-item"><a href="{{ '/blog' | relative_url }}"><span>Blog</span></a></li>
    <li class="nav-item"><a href="{{ '/contact' | relative_url }}"><span>Contact</span></a></li>
  {% endcapture %}

  <div class="header-top-rule" aria-hidden="true"></div>

  <div class="header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ church.name }} home">
      <span class="brand-dove" aria-hidden="true"></span>
      <span class="brand-copy">
        <span class="brand-name">{{ church.brand_name }}</span>
        <span class="brand-location">{{ church.location_name }}</span>
        <span class="brand-tagline">{{ church.tagline }}</span>
      </span>
    </a>

    <nav class="site-nav desktop-nav" aria-label="Main navigation">
      <ul class="nav-list">{{ navigation_links }}</ul>
    </nav>

    <div class="mobile-menu">
      <button class="menu-toggle" type="button" aria-label="Main menu" aria-controls="mobile-navigation" aria-expanded="false">
        <span class="menu-toggle-label">Menu</span>
        <span class="menu-toggle-icon" aria-hidden="true"><span></span><span></span><span></span></span>
      </button>

      <nav class="site-nav" id="mobile-navigation" aria-label="Main navigation">
        <ul class="nav-list">{{ navigation_links }}</ul>
      </nav>
    </div>
  </div>
</header>
