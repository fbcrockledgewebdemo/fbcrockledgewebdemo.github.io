gatherings:
  - title: Ladies Game Day
    schedule: Second Thursday of each month
    time: "10:00 AM"
    location: Fellowship Hall
    description: Ladies are invited to play cards and games, followed by prayer and Scripture reading. Please join us and bring a friend.

  - title: Men's Ministry Breakfast
    schedule: First Saturday of each month
    time: "9:00 AM"
    location: Location announced monthly
    description: A time to get to know one another better and grow in the Christian walk, with food and fellowship.

  - title: Ladies of Grace Luncheon
    schedule: First Saturday of each month
    time: "12:00 PM"
    location: Fellowship Hall or announced monthly
    description: A time for Christian women to enjoy fellowship, Bible study, and lunch together.
