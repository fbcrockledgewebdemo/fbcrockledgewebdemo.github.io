<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d183d">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="{{ page.description | default: 'First Baptist Church of Rockledge' }}">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
  {% include header.html %}

  <main class="page-content" id="main-content" aria-label="Page content">
    {{ content }}
  </main>

  {% include footer.html %}
  <script src="{{ '/assets/js/navigation-toggle.js' | relative_url }}" defer></script>
</body>
</html>
